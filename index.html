<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to My Portfolio</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            color: #333;
        }

        h1 {
            text-align: center;
            color: #ff5722;
            font-size: 2.8em;
        }

        .section {
            margin: 20px auto;
            max-width: 800px;
            background-color: #ffffff;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .section p {
            font-size: 1.2em;
            margin: 20px 0;
            color: #555;
        }

        img {
            width: 100%;
            max-width: 500px;
            border-radius: 10px;
            margin: 20px 0;
        }

        .navigation a {
            display: inline-block;
            margin: 20px auto;
            padding: 10px 20px;
            background-color: #ff5722;
            color: #ffffff;
            font-weight: bold;
            text-decoration: none;
            border-radius: 5px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        .navigation a:hover {
            background-color: #e64a19;
            box-shadow: 0 6px 10px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <div class="section">
        <h1>Welcome to My Portfolio</h1>
        <p>
            I'm glad you're here! <br>
            This portfolio showcases my skills, education, and experiences.
        </p>
       
        <div class="navigation">
            <a href="./personal.html">Explore</a>
        </div>
    </div>
</body>
</html>
